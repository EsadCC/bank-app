<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinNova</title>
    <script src="https://kit.fontawesome.com/e3edab2e0c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="inlog.css">
</head>
<body>
    <nav class="navbar1" id="navbar1">
        <img src="img/FinNovalogo-removebg-preview.png" width="150" class="logo" id="logo">
        <input type="text"  placeholder="Zoeken" class="zoeken" id="zoeken">
        <img src="img/user.png" width="60" class="user" id="user">
    </nav>

    <main>
        <section class="section1" id="section1">
            <h1 class="welkom" id="welkom">Welkom bij FinNova</h1>
            <p class="p1" id="p1">Snel en eenvoudig je geld beheren.</p>
            <button class="account-maken" id="account-maken">Maak een account</button>
        </section>
        <section class="section2" id="section2">
            <img src="img/user-salary.png" class="user-salary" id="user-salary">
        </section>
    </main>

    <footer class="footer" id="footer">
    <div class="account-item betaalrekeningen">
        <img src="img/bank.png" width="100">
        <br>
        Betaalrekeningen
    </div>

    <div class="account-item spaarrekeningen">
        <img src="img/piggy-bank-budget.png" width="100">
        <br>
        Spaarrekeningen
    </div>

    <div class="account-item creditcard">
        <img src="img/credit-card.png" width="100">
        <br>
        Credit card
    </div>
</footer>
</body>
</html>
