<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinNova - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://kit.fontawesome.com/e3edab2e0c.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav class="nav-head" id="nav-head">
            <img src="img/FinNovalogo-removebg-preview.png" width="100" class="logo" id="logo"> 
            <div class="userpng"><i class="fas fa-user"></i></div> 
        </nav>
    </header>

    <div class="layout-navbar">
        <nav class="navbar" id="navbar">
            <ul>
                <li class="dashboard actief"><a>Dashboard</a></li>
                <li class="rekeningen"><a>Rekeningen</a></li>
                <li class="overschrijven"><a>Overschrijven</a></li>
                <li class="kaarten"><a>Kaarten</a></li>
                <li class="spaardoelen"><a>Spaardoelen</a></li>
                <li class="instellingen"><a>Instellingen</a></li>
                <li class="help"><a>Help</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <h1 class="goedemiddag" id="goedemiddag">Goedemiddag, ...</h1>

            <section class="saldo-overzicht">
                <div class="saldo-item saldo-main">
                    <span>Saldo:</span>
                    <p>€2918,34</p>
                </div>
                <div class="saldo-item spaarrekening">
                    <span>Spaarrekening:</span>
                    <p>€492,21</p>
                </div>
                <div class="saldo-item creditcard-saldo">
                    <span>Creditcard:</span>
                    <p>€1028,53</p>
                </div>
            </section>

            <section class="latest-transacties">
                <h2>Laatste transacties</h2>
                <div class="transactie-list">
                    <div class="transactie-row">
                        <span class="datum">11-23</span>
                        <p class="kaart1" id="kaart1">IBAN: NLXX...34</p>
                        <div class="progress-bar"></div>
                        <span class="bedrag">-34,18</span></div>
                    <div class="transactie-row">
                        <span class="datum">10-18</span>
                        <p class="kaart1" id="kaart1">IBAN: NLXX...02</p>
                        <div class="progress-bar"></div>
                        <span class="bedrag">-49,99</span>
                    </div>
                    <div class="transactie-row">
                        <span class="datum">10-05</span>
                        <p class="kaart1" id="kaart1">IBAN: NLXX...95</p>
                        <div class="progress-bar"></div>
                        <span class="bedrag">-2,99</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
