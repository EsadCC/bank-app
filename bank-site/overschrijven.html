<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinNova - Dashboard</title>
    <link rel="stylesheet" href="overschrijven.css">
    <script src="https://kit.fontawesome.com/e3edab2e0c.js" crossorigin="anonymous"></script>
    <script src="overschrijven.js" defer></script>
</head>
<body>
    <header>
        <nav class="nav-head" id="nav-head">
            <img src="img/FinNovalogo-removebg-preview.png" width="100" class="logo" id="logo">
            <div id="dropDown" class="dropDown">
            <div class="userpng" id="userToggle"><i class="fas fa-user"></i></div>
            <ul class="dropMenu">
              <li id="settingsDrop">Instellingen</li>
              <li id="helpDrop">Help</li>
              <li id="logUitDrop">Uitloggen</li>
            </ul>
            </div>
        </nav>
    </header>

    <div class="layout-navbar">
        <nav class="navbar" id="navbar">
            <ul>
                <li class="dashboard"><a href="dashboard.html">Dashboard</a></li>
                <li class="rekeningen"><a href="rekeningen.html">Rekeningen</a></li>
                <li class="overschrijven actief"><a href="overschrijven.html">Overschrijven</a></li>
                <li class="transacties"><a href="transacties.html">Transacties</a></li>
                <li class="spaardoelen"><a>Spaardoelen</a></li>
                <li class="instellingen"><a>Instellingen</a></li>
                <li class="help"><a>Help</a></li>
            </ul>
        </nav>

  <main class="main-content">
    <section class="overschrijven-card">
  <h1 class="overschrijven-title">Geld Overschrijven</h1>

  <form id="transferForm">

    <div class="account-group">
      <span class="account-label">Van rekening</span>
      <div class="account-options">
        <label class="account-card">
          <input type="radio" name="from" value="betaal" checked>
          <span>Betaalrekening</span>
          <small id="bal-betaal">€1500,00</small>
        </label>

        <label class="account-card">
          <input type="radio" name="from" value="spaar">
          <span>Spaarrekening</span>
          <small id="bal-spaar">€10000,00</small>
        </label>

        <label class="account-card">
          <input type="radio" name="from" value="cc">
          <span>Creditcard</span>
          <small id="bal-cc">€1000,00</small>
        </label>
      </div>
    </div>

    <div class="account-group">
      <span class="account-label">Naar rekening</span>
      <div class="account-options">
        <label class="account-card">
          <input type="radio" name="to" value="betaal">
          <span>Betaalrekening</span>
        </label>

        <label class="account-card">
          <input type="radio" name="to" value="spaar" checked>
          <span>Spaarrekening</span>
        </label>

        <label class="account-card">
          <input type="radio" name="to" value="cc">
          <span>Creditcard</span>
        </label>
      </div>
    </div>

    <div class="transfer-actions">
      <label class="account-label" for="bedragInput">Bedrag</label>
      <input type="number" id="bedragInput" min="0.01" step="0.01" placeholder="100" required>
      <button class="btn-transfer" type="submit">Overschrijven</button>

      <div class="transfer-message" id="transferMessage" aria-live="polite"></div>
    </div>

  </form>
</section>

  </main>
</div>
</body>

</html>
