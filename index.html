<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinNova - Home</title>
    <script src="https://kit.fontawesome.com/e3edab2e0c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Home.css">
    <script src="Home.js" defer></script>
</head>
<body>
    <nav class="navbar1" id="navbar1">
        <img src="FinNovalogo-removebg-preview.png" class="logo" id="logo" width="100">
        <button class="inloggen-knop" id="inlogknop">Inloggen</button>
    </nav>

    <main>
        <section class="section1" id="section1">
            <h1 class="welkom" id="welkom">Welkom bij FinNova</h1>
            <p class="p1" id="p1">Snel en eenvoudig je geld beheren.</p>
            <p>naam: gebruiker1  wachtwoord: Abc!</p>
            <br>
            <button class="account-maken" id="accountmaken">Log in</button>
        </section>
        <section class="section2" id="section2">
            <img src="user-salary.png" class="user-salary" id="user-salary">
        </section>
    </main>

    <footer class="footer" id="footer">
        <article class="account-item betaalrekeningen">
            <img src="bank.png" width="100">
            <br>
            Betaalrekeningen
        </article>
        <article class="account-item spaarrekeningen">
            <img src="piggy-bank-budget.png" width="100">
            <br>
            Spaarrekeningen
        </article>
        <article class="account-item creditcard">
            <img src="credit-card.png" width="100">
            <br>
            Credit card
        </article>
    </footer>

    <dialog class="box" id="box">
        <section class="box-content">
            <button class="close-button" id="closeLogin" type="button" aria-label="Sluiten">&times;</button> 

            <img src="FinNovalogo-removebg-preview.png" width="100">
            <h1>Welkom terug</h1>
            <form id="loginForm">
                <input type="text" placeholder="Gebruikersnaam" required id="gebruikersnaam"/>
                <input type="password" placeholder="Wachtwoord" required id="wachtwoord"/>
                <p id="notification"></p>
                <a href="#">Wachtwoord vergeten?</a>
                <button type="submit" class="knop inloggen-knop" id="submit1">Inloggen</button>
            </form>
            <p>Nog geen account? <a href="#" id="linkToSignup">Account aanmaken</a></p>
        </section>
    </dialog>

    <dialog class="box" id="box2">
        <section class="box-content">
            <button class="close-button" id="closeSignup" type="button" aria-label="Sluiten">&times;</button>
            <img src="img/FinNovalogo-removebg-preview.png" width="100">
            <h1>Maak je account aan</h1>
            <form id="signupForm">
                <input type="text" placeholder="Voornaam" required  id="voornaam"/>
                <input type="text" placeholder="Achternaam" required  id="achternaam"/>
                <input type="email" placeholder="E-mailadres" required id="email"/>
                <input type="password" placeholder="Wachtwoord" required id="signup-wachtwoord"/>
                <button type="submit" class="knop aanmelden-knop" id="submit2">Account aanmaken</button>
            </form>
            <p id="signup-notification"></p>

            <p>Heb je al een account? <a href="#" id="linkToLogin">Inloggen</a></p>
        </section>
    </dialog>
</body>
</html>
